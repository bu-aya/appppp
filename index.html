<body class="text-slate-800 antialiased">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase config placeholder (akan diisi via pengaturan aplikasi/lokal)

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Custom Simulated Alert component instead of window.alert()
        const CustomAlert = ({ message, type, onClose }) => {
            if (!message) return null;
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [message, onClose]);

            return (
                <div className="fixed bottom-5 right-5 z-50 flex items-center p-4 mb-4 text-sm rounded-xl shadow-2xl border border-slate-100 animate-slide-in bg-white" style={{ minWidth: '300px' }}>
                    <span className={`flex items-center justify-center w-10 h-10 rounded-xl ${type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'} mr-3`}>
                        <i className={`fa-solid ${type === 'success' ? 'fa-circle-check text-lg' : 'fa-triangle-exclamation text-lg'}`}></i>
                    </span>
                    <div className="flex-1">
                        <p className="font-semibold text-slate-900">{type === 'success' ? 'Berhasil' : 'Pemberitahuan'}</p>
                        <p className="text-slate-500 text-xs">{message}</p>
                    </div>
                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600 ml-3">
                        <i className="fa-solid fa-xmark"></i>
                    </button>
                </div>
            );
        };

        const MOCK_SISWA_AWAL = [
            { id: "s1", nama: "Ahmad Fauzi", nis: "192001", nisn: "0123456789", tmptLahir: "Bekasi", tglLahir: "2013-05-12", namaAyah: "Sulaiman", kelas: "1A", status: "Aktif", tahunAjaran: "2019/2020", gender: "L" },
            { id: "s2", nama: "Siti Aminah", nis: "192002", nisn: "0123456790", tmptLahir: "Karawang", tglLahir: "2013-09-24", namaAyah: "Lukman", kelas: "1A", status: "Aktif", tahunAjaran: "2019/2020", gender: "P" },
            { id: "s3", nama: "Rizky Ramadan", nis: "202103", nisn: "0123456791", tmptLahir: "Bekasi", tglLahir: "2014-07-02", namaAyah: "Hasan", kelas: "2A", status: "Mutasi Masuk", tahunAjaran: "2020/2021", gender: "L", mutasiMasukTgl: "2020-07-15", mutasiMasukAsal: "SDIT Al-Hidayah", mutasiMasukAlamat: "Cikarang" },
            { id: "s4", nama: "Naila Safitri", nis: "212204", nisn: "0123456792", tmptLahir: "Bekasi", tglLahir: "2015-02-18", namaAyah: "Rudi", kelas: "3A", status: "Mutasi Keluar", tahunAjaran: "2021/2022", gender: "P", mutasiKeluarTgl: "2022-01-10", mutasiKeluarTujuan: "SDN Karang Asih 02", mutasiKeluarAlamat: "Cikarang Utara" },
            { id: "s5", nama: "Alif Pratama", nis: "181905", nisn: "0112233445", tmptLahir: "Bandung", tglLahir: "2012-03-30", namaAyah: "Doni", kelas: "6A", status: "Lulus", tahunAjaran: "2023/2024", gender: "L", noIjazah: "DN-02/D-SD/06/123456", tglLulus: "2024-06-15", nilaiRataIjazah: 88.5 }

        const MOCK_NILAI_AWAL = {
            "s1_2019/2020_1A_Ganjil": { PAI: 85, PPKN: 80, BIndo: 82, MTK: 78, IPA: 85, IPS: 80, SBDP: 88, PJOK: 84, BSunda: 80, BInggris: 75, catatan: "Terus tingkatkan belajarnya", sakit: 0, izin: 1, alpa: 0 },
            "s5_2023/2024_6A_Genap": { PAI: 90, PPKN: 88, BIndo: 92, MTK: 85, IPA: 89, IPS: 87, SBDP: 90, PJOK: 88, BSunda: 85, BInggris: 86, catatan: "Sangat berprestasi dan patut dipertahankan", sakit: 1, izin: 0, alpa: 0 }
        };

        const MOCK_CP_TP_AWAL = [
            { id: "c1", kelas: "1", mapel: "PAI", cp: "Memahami rukun Islam dan rukun iman.", tp: "Menyebutkan rukun iman dengan berurutan." },
            { id: "c2", kelas: "1", mapel: "MTK", cp: "Mengenal angka dan operasi penjumlahan dasar.", tp: "Menghitung penjumlahan angka 1-20." }
        ];

        const MOCK_SURAT_MASUK_AWAL = [
            { id: "sm1", noSurat: "021/YPA/IX/2025", asal: "Yayasan Pendidikan Annihayah", perihal: "Undangan Rapat Kerja", tglSurat: "2025-09-01", tglDiterima: "2025-09-02", fileBukti: "undangan_rapat.jpg" }
        ];

        const MOCK_SURAT_KELUAR_AWAL = [
            { id: "sk1", noSurat: "102/SDIT-AN/X/2025", jenisSurat: "Keterangan Aktif", siswaId: "s1", tglSurat: "2025-10-05", detailTambahan: { keperluan: "Persyaratan BPJS Kesehatan Orangtua" } }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeSubTab, setActiveSubTab] = useState('list-siswa');
            
            // Database states
            const [siswaList, setSiswaList] = useState([]);
            const [nilaiRapor, setNilaiRapor] = useState({});
            const [cpTpList, setCpTpList] = useState([]);
            const [suratMasukList, setSuratMasukList] = useState([]);
            const [suratKeluarList, setSuratKeluarList] = useState([]);
            
            // Settings states
            const [settings, setSettings] = useState({
                kelas: ["1A", "1B", "2A", "2B", "3A", "3B", "4A", "4B", "5A", "5B", "6A", "6B"],
                tahunAjaranList: ["2019/2020", "2020/2021", "2021/2022", "2022/2023", "2023/2024", "2024/2025", "2025/2026", "2026/2027"],
                tahunAjaranAktif: "2025/2026",
                kepalaSekolah: "H. Mhd. Anwar, S.Pd.I.",
                tanggalCetakRapor: "2026-06-20",
                tanggalCetakTranskrip: "2026-06-25",
                tanggalCetakSurat: "2026-07-08",
                firebaseConfig: { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" }
            });

            // UI Alert
            const [alertMsg, setAlertMsg] = useState("");
            const [alertType, setAlertType] = useState("success");

            // Form states
            const [siswaForm, setSiswaForm] = useState({ id: "", nama: "", nis: "", nisn: "", tmptLahir: "", tglLahir: "", namaAyah: "", kelas: "1A", status: "Aktif", tahunAjaran: "2025/2026", gender: "L", noIjazah: "", tglLulus: "", nilaiRataIjazah: "", mutasiMasukTgl: "", mutasiMasukAsal: "", mutasiMasukAlamat: "", mutasiKeluarTgl: "", mutasiKeluarTujuan: "", mutasiKeluarAlamat: "", fotoUrl: "" });
            const [showSiswaModal, setShowSiswaModal] = useState(false);
            const [isEditSiswa, setIsEditSiswa] = useState(false);

            // Nilai state
            const [selectedSiswaId, setSelectedSiswaId] = useState("");
            const [selectedTA, setSelectedTA] = useState("2025/2026");
            const [selectedKelas, setSelectedKelas] = useState("1A");
            const [selectedSemester, setSelectedSemester] = useState("Ganjil");
            const [nilaiForm, setNilaiForm] = useState({ PAI: "", PPKN: "", BIndo: "", MTK: "", IPAS: "", IPA: "", IPS: "", SBDP: "", PJOK: "", BSunda: "", BInggris: "", catatan: "", sakit: 0, izin: 0, alpa: 0 });
            
            // Excel Import state
            const [excelInput, setExcelInput] = useState("");
            const [showImportModal, setShowImportModal] = useState(false);
            const [importTarget, setImportTarget] = useState("nilai"); // 'nilai' atau 'leger'

            // CP/TP State
            const [cpTpForm, setCpTpForm] = useState({ id: "", kelas: "1", mapel: "PAI", cp: "", tp: "" });
            const [showCpTpModal, setShowCpTpModal] = useState(false);
            const [isEditCpTp, setIsEditCpTp] = useState(false);

            // Surat Masuk State
            const [suratMasukForm, setSuratMasukForm] = useState({ id: "", noSurat: "", asal: "", perihal: "", tglSurat: "", tglDiterima: "", fileBukti: "" });
            const [showSuratMasukModal, setShowSuratMasukModal] = useState(false);
            const [isEditSuratMasuk, setIsEditSuratMasuk] = useState(false);

            // Surat Keluar State
            const [suratKeluarForm, setSuratKeluarForm] = useState({ id: "", noSurat: "", jenisSurat: "Keterangan Aktif", siswaId: "", tglSurat: "", detailTambahan: {} });
            const [showSuratKeluarModal, setShowSuratKeluarModal] = useState(false);
            const [isEditSuratKeluar, setIsEditSuratKeluar] = useState(false);

            // Preview & Print State
            const [activePreviewDoc, setActivePreviewDoc] = useState(null); // { type: 'rapor'|'transkrip'|'surat', data: {} }

            useEffect(() => {
                // Ambil data lokal jika tersedia, jika tidak pakai MOCK data
                const localSiswa = localStorage.getItem("SDIT_siswa");
                const localNilai = localStorage.getItem("SDIT_nilai");
                const localCpTp = localStorage.getItem("SDIT_cptp");
                const localSuratMasuk = localStorage.getItem("SDIT_surat_masuk");
                const localSuratKeluar = localStorage.getItem("SDIT_surat_keluar");
                const localSettings = localStorage.getItem("SDIT_settings");

                if (localSiswa) setSiswaList(JSON.parse(localSiswa));
                else {
                    setSiswaList(MOCK_SISWA_AWAL);
                    localStorage.setItem("SDIT_siswa", JSON.stringify(MOCK_SISWA_AWAL));
                }

                if (localNilai) setNilaiRapor(JSON.parse(localNilai));
                else {
                    setNilaiRapor(MOCK_NILAI_AWAL);
                    localStorage.setItem("SDIT_nilai", JSON.stringify(MOCK_NILAI_AWAL));
                }

                if (localCpTp) setCpTpList(JSON.parse(localCpTp));
                else {
                    setCpTpList(MOCK_CP_TP_AWAL);
                    localStorage.setItem("SDIT_cptp", JSON.stringify(MOCK_CP_TP_AWAL));
                }

                if (localSuratMasuk) setSuratMasukList(JSON.parse(localSuratMasuk));
                else {
                    setSuratMasukList(MOCK_SURAT_MASUK_AWAL);
                    localStorage.setItem("SDIT_surat_masuk", JSON.stringify(MOCK_SURAT_MASUK_AWAL));
                }

                if (localSuratKeluar) setSuratKeluarList(JSON.parse(localSuratKeluar));
                else {
                    setSuratKeluarList(MOCK_SURAT_KELUAR_AWAL);
                    localStorage.setItem("SDIT_surat_keluar", JSON.stringify(MOCK_SURAT_KELUAR_AWAL));
                }

                if (localSettings) setSettings(JSON.parse(localSettings));
            }, []);

            // Helper to trigger alert
            const showAlert = (msg, type = "success") => {
                setAlertMsg(msg);
                setAlertType(type);
            };

            // Save handlers that write to localStorage
            const saveSiswaToStorage = (updated) => {
                setSiswaList(updated);
                localStorage.setItem("SDIT_siswa", JSON.stringify(updated));
            };

            const saveNilaiToStorage = (updated) => {
                setNilaiRapor(updated);
                localStorage.setItem("SDIT_nilai", JSON.stringify(updated));
            };

            const saveCpTpToStorage = (updated) => {
                setCpTpList(updated);
                localStorage.setItem("SDIT_cptp", JSON.stringify(updated));
            };

            const saveSuratMasukToStorage = (updated) => {
                setSuratMasukList(updated);
                localStorage.setItem("SDIT_surat_masuk", JSON.stringify(updated));
            };

            const saveSuratKeluarToStorage = (updated) => {
                setSuratKeluarList(updated);
                localStorage.setItem("SDIT_surat_keluar", JSON.stringify(updated));
            };

            const saveSettingsToStorage = (updated) => {
                setSettings(updated);
                localStorage.setItem("SDIT_settings", JSON.stringify(updated));
            };

            const stats = useMemo(() => {
                const total = siswaList.length;
                const aktif = siswaList.filter(s => s.status === 'Aktif').length;
                const laki = siswaList.filter(s => s.gender === 'L').length;
                const perempuan = siswaList.filter(s => s.gender === 'P').length;
                const mutasiMasuk = siswaList.filter(s => s.status === 'Mutasi Masuk').length;
                const mutasiKeluar = siswaList.filter(s => s.status === 'Mutasi Keluar').length;
                const lulus = siswaList.filter(s => s.status === 'Lulus').length;

                return { total, aktif, laki, perempuan, mutasiMasuk, mutasiKeluar, lulus };
            }, [siswaList]);

            const isKmerdeka = (ta) => {
                if (!ta) return false;
                const startYear = parseInt(ta.split('/')[0]);
                return startYear >= 2024; // Mulai tahun ajaran 2024/2025 menggunakan IPAS
            };

            const handleSiswaSubmit = (e) => {
                e.preventDefault();
                let updatedList;
                if (isEditSiswa) {
                    updatedList = siswaList.map(s => s.id === siswaForm.id ? { ...siswaForm } : s);
                    showAlert("Data siswa berhasil diperbarui.");
                } else {
                    const newSiswa = { ...siswaForm, id: "s_" + Date.now() };
                    updatedList = [...siswaList, newSiswa];
                    showAlert("Siswa baru berhasil ditambahkan.");
                }
                saveSiswaToStorage(updatedList);
                setShowSiswaModal(false);
                resetSiswaForm();
            };

            const resetSiswaForm = () => {
                setSiswaForm({ id: "", nama: "", nis: "", nisn: "", tmptLahir: "", tglLahir: "", namaAyah: "", kelas: "1A", status: "Aktif", tahunAjaran: settings.tahunAjaranAktif, gender: "L", noIjazah: "", tglLulus: "", nilaiRataIjazah: "", mutasiMasukTgl: "", mutasiMasukAsal: "", mutasiMasukAlamat: "", mutasiKeluarTgl: "", mutasiKeluarTujuan: "", mutasiKeluarAlamat: "", fotoUrl: "" });
            };

            const handleEditSiswa = (siswa) => {
                setSiswaForm({ ...siswa });
                setIsEditSiswa(true);
                setShowSiswaModal(true);
            };

            const handleDeleteSiswa = (id) => {
                if (confirm("Apakah Anda yakin ingin menghapus data siswa ini secara permanen?")) {
                    const updated = siswaList.filter(s => s.id !== id);
                    saveSiswaToStorage(updated);
                    showAlert("Data siswa telah dihapus.", "error");
                }
            };

            useEffect(() => {
                if (selectedSiswaId) {
                    const key = `${selectedSiswaId}_${selectedTA}_${selectedKelas}_${selectedSemester}`;
                    if (nilaiRapor[key]) {
                        setNilaiForm({ ...nilaiRapor[key] });
                    } else {
                        setNilaiForm({ PAI: "", PPKN: "", BIndo: "", MTK: "", IPAS: "", IPA: "", IPS: "", SBDP: "", PJOK: "", BSunda: "", BInggris: "", catatan: "", sakit: 0, izin: 0, alpa: 0 });
                    }
                }
            }, [selectedSiswaId, selectedTA, selectedKelas, selectedSemester, nilaiRapor]);

            const handleNilaiSubmit = (e) => {
                e.preventDefault();
                if (!selectedSiswaId) {
                    showAlert("Silakan pilih siswa terlebih dahulu.", "error");
                    return;
                }
                const key = `${selectedSiswaId}_${selectedTA}_${selectedKelas}_${selectedSemester}`;
                const updatedNilai = { ...nilaiRapor, [key]: { ...nilaiForm } };
                saveNilaiToStorage(updatedNilai);
                showAlert("Nilai rapor berhasil disimpan.");
            };

            const handleImportExcel = () => {
                if (!excelInput.trim()) {
                    showAlert("Silakan tempel data dari tabel Excel terlebih dahulu.", "error");
                    return;
                }

                try {
                    const lines = excelInput.trim().split("\n");
                    let successCount = 0;
                    const tempNilai = { ...nilaiRapor };

                    lines.forEach(line => {
                        const cols = line.split("\t");
                        if (cols.length >= 5) {
                            // Format: NIS / ID, TA, KELAS, SEMESTER, PAI, PPKN, BIndo, MTK, dst.
                            const idSiswaOrNis = cols[0].trim();
                            const ta = cols[1].trim();
                            const klis = cols[2].trim();
                            const sem = cols[3].trim();
                            
                            // Temukan siswa berdasarkan ID atau NIS
                            const targetSiswa = siswaList.find(s => s.id === idSiswaOrNis || s.nis === idSiswaOrNis);
                            if (targetSiswa) {
                                const key = `${targetSiswa.id}_${ta}_${klis}_${sem}`;
                                tempNilai[key] = {
                                    PAI: parseFloat(cols[4]) || 0,
                                    PPKN: parseFloat(cols[5]) || 0,
                                    BIndo: parseFloat(cols[6]) || 0,
                                    MTK: parseFloat(cols[7]) || 0,
                                    IPAS: parseFloat(cols[8]) || 0,
                                    IPA: parseFloat(cols[8]) || 0, // Fallback jika IPA/IPS
                                    IPS: parseFloat(cols[9]) || 0,
                                    SBDP: parseFloat(cols[10]) || 0,
                                    PJOK: parseFloat(cols[11]) || 0,
                                    BSunda: parseFloat(cols[12]) || 0,
                                    BInggris: parseFloat(cols[13]) || 0,
                                    catatan: cols[14] ? cols[14].trim() : "Tingkatkan belajarmu.",
                                    sakit: parseInt(cols[15]) || 0,
                                    izin: parseInt(cols[16]) || 0,
                                    alpa: parseInt(cols[17]) || 0
                                };
                                successCount++;
                            }
                        }
                    });

                    if (successCount > 0) {
                        saveNilaiToStorage(tempNilai);
                        showAlert(`Berhasil mengimpor ${successCount} data nilai dari Excel.`);
                        setExcelInput("");
                        setShowImportModal(false);
                    } else {
                        showAlert("Tidak ada siswa yang cocok atau format data salah.", "error");
                    }
                } catch (err) {
                    showAlert("Gagal memproses data. Periksa kembali struktur tabel Anda.", "error");
                }
            };

            const handleCpTpSubmit = (e) => {
                e.preventDefault();
                let updated;
                if (isEditCpTp) {
                    updated = cpTpList.map(c => c.id === cpTpForm.id ? { ...cpTpForm } : c);
                    showAlert("CP/TP berhasil diperbarui.");
                } else {
                    const newCp = { ...cpTpForm, id: "cp_" + Date.now() };
                    updated = [...cpTpList, newCp];
                    showAlert("CP/TP baru berhasil ditambahkan.");
                }
                saveCpTpToStorage(updated);
                setShowCpTpModal(false);
                setCpTpForm({ id: "", kelas: "1", mapel: "PAI", cp: "", tp: "" });
            };

            const handleEditCpTp = (item) => {
                setCpTpForm({ ...item });
                setIsEditCpTp(true);
                setShowCpTpModal(true);
            };

            const handleDeleteCpTp = (id) => {
                if (confirm("Apakah Anda yakin ingin menghapus target CP/TP ini?")) {
                    const updated = cpTpList.filter(c => c.id !== id);
                    saveCpTpToStorage(updated);
                    showAlert("CP/TP dihapus.", "error");
                }
            };

            const handleSuratMasukSubmit = (e) => {
                e.preventDefault();
                let updated;
                if (isEditSuratMasuk) {
                    updated = suratMasukList.map(s => s.id === suratMasukForm.id ? { ...suratMasukForm } : s);
                    showAlert("Arsip Surat Masuk berhasil diupdate.");
                } else {
                    const newSurat = { ...suratMasukForm, id: "sm_" + Date.now(), fileBukti: suratMasukForm.fileBukti || "bukti_surat.jpg" };
                    updated = [...suratMasukList, newSurat];
                    showAlert("Arsip Surat Masuk baru berhasil dicatat.");
                }
                saveSuratMasukToStorage(updated);
                setShowSuratMasukModal(false);
                setSuratMasukForm({ id: "", noSurat: "", asal: "", perihal: "", tglSurat: "", tglDiterima: "", fileBukti: "" });
            };

            const handleSuratKeluarSubmit = (e) => {
                e.preventDefault();

                                                                <div className="grid grid-cols-2 gap-x-1 gap-y-0.5 text-slate-600">
                                                                    {Object.entries(g.scores).map(([mapel, val]) => (
                                                                        <div key={mapel} className="flex justify-between">
                                                                            <span>{mapel}:</span>
                                                                            <span className="font-bold text-slate-800">{val}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Signatures for Transcript */}
                                            <div className="mt-8 text-xs flex justify-between items-start text-center">
                                                <div className="w-56 space-y-12">
                                                    <div>
                                                        <p>Arsip Sekolah,</p>
                                                        <p className="font-bold">Staff Administrasi & Arsip</p>
                                                    </div>
                                                    <div className="border-b border-dashed border-black mx-4 h-6"></div>
                                                </div>

                                                <div className="w-64 space-y-12">
                                                    <div>
                                                        <p>Bekasi, {settings.tanggalCetakTranskrip}</p>
                                                        <p className="font-bold">Kepala Sekolah SDIT ANNIHAYAH</p>
                                                    </div>
                                                    <div>
                                                        <p className="font-extrabold underline">{settings.kepalaSekolah}</p>
                                                        <p className="text-[10px] text-slate-500">NIP. 197605202008011003</p>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    )}

                                    {/* PREVIEW SURAT KELUAR (Portrait A4) */}
                                    {activePreviewDoc.type === 'surat' && (
                                        <div className="bg-white shadow-xl p-10 max-w-[210mm] min-h-[297mm] text-slate-950 font-sans border border-slate-200 w-full" id="printable-surat-sheet">
                                            
                                            {/* Official Letterhead */}
                                            <div className="text-center border-b-4 border-black pb-4 mb-6">
                                                <h1 className="text-xl font-bold uppercase tracking-tight">YAYASAN PENDIDIKAN ANNIHAYAH</h1>
                                                <h2 className="text-lg font-extrabold uppercase tracking-tight text-emerald-800">SDIT ANNIHAYAH</h2>
                                                <p className="text-[10px] text-slate-500">Izin Operasional No: 503.15/03/IV/SK-SDIT/DPMPTSP/2018</p>
                                                <p className="text-[9px] text-slate-400">Kp. Karang Anyar, Kec. Cikarang Utara, Kab. Bekasi - Jawa Barat</p>
                                            </div>

                                            {/* Letter Metadata */}
                                            <div className="text-center space-y-1 mb-6">
                                                <h3 className="text-sm font-bold uppercase underline tracking-wider">{activePreviewDoc.data.surat.jenisSurat}</h3>
                                                <p className="text-xs">Nomor: {activePreviewDoc.data.surat.noSurat}</p>
                                            </div>

                                            {/* Body of the official letter */}
                                            <div className="space-y-4 text-xs text-justify leading-relaxed">
                                                <p>Yang bertandatangan di bawah ini Kepala Sekolah SDIT Annihayah Cikarang Utara, Kabupaten Bekasi, Provinsi Jawa Barat menerangkan dengan sesungguhnya bahwa:</p>
                                                
                                                <div className="pl-6 space-y-1">
                                                    <table className="w-full">
                                                        <tbody>
                                                            <tr><td className="w-32 py-0.5 font-bold">Nama Siswa</td><td>: {activePreviewDoc.data.siswa?.nama || "-"}</td></tr>
                                                            <tr><td className="py-0.5 font-bold">NIS / NISN</td><td>: {activePreviewDoc.data.siswa?.nis || "-"} / {activePreviewDoc.data.siswa?.nisn || "-"}</td></tr>
                                                            <tr><td className="py-0.5 font-bold">Tempat, Tgl Lahir</td><td>: {activePreviewDoc.data.siswa?.tmptLahir || "-"}, {activePreviewDoc.data.siswa?.tglLahir || "-"}</td></tr>
                                                            <tr><td className="py-0.5 font-bold">Nama Wali / Ayah</td><td>: {activePreviewDoc.data.siswa?.namaAyah || "-"}</td></tr>
                                                            <tr><td className="py-0.5 font-bold">Kelas / Keadaan</td><td>: {activePreviewDoc.data.siswa?.kelas || "-"} / {activePreviewDoc.data.siswa?.status || "Aktif"}</td></tr>
                                                        </tbody>
                                                    </table>
                                                </div>

                                                <p>Adalah benar merupakan siswa terdaftar aktif pada SDIT Annihayah pada tahun ajaran yang bersangkutan.</p>
                                                
                                                {activePreviewDoc.data.surat.jenisSurat === 'Keterangan Aktif' && (
                                                    <p>Surat keterangan aktif ini diterbitkan atas permohonan bersangkutan guna keperluan: <span className="font-bold">{activePreviewDoc.data.surat.detailTambahan?.keperluan || "Mengurus administrasi sosial/keluarga"}</span>.</p>
                                                )}

                                                {activePreviewDoc.data.surat.jenisSurat === 'Surat Pindah Siswa' && (
                                                    <p>Siswa tersebut di atas terhitung sejak tanggal ini dinyatakan pindah / bermutasi ke sekolah baru yang dituju sesuai permohonan pindah orang tua.</p>
                                                )}

                                                <p>Demikian surat keterangan resmi ini dibuat dengan sebenar-benarnya untuk dapat dipergunakan sebagaimana mestinya.</p>
                                            </div>

                                            {/* Signatures for Official Letter */}
                                            <div className="mt-12 text-xs flex justify-end">
                                                <div className="w-64 space-y-12 text-center">
                                                    <div>
                                                        <p>Bekasi, {activePreviewDoc.data.surat.tglSurat}</p>
                                                        <p className="font-bold">Kepala Sekolah SDIT ANNIHAYAH</p>
                                                    </div>
                                                    <div>
                                                        <p className="font-extrabold underline">{settings.kepalaSekolah}</p>
                                                        <p className="text-[10px] text-slate-500">NIP. 197605202008011003</p>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
